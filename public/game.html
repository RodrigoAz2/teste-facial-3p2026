<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Jogo de Carro</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body{font-family:Arial,sans-serif;background:#111;color:#eee;display:flex;flex-direction:column;align-items:center;min-height:100vh;margin:0;padding:16px}
    h1{margin:0 0 12px}
    canvas{border:4px solid #444;background:#000;max-width:100%;height:auto}
    #controls{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin:12px 0}
    button{padding:10px 14px;border:none;border-radius:6px;background:#2a8;color:#111;font-weight:700;cursor:pointer;transition:transform .1s ease}
    button:active{transform:scale(.96)}
    #info{font-size:0.95rem;color:#ccc;text-align:center;max-width:760px}
    #blinkStatus{margin-top:8px;color:#aaf;font-size:0.95rem}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>
<body>
  <h1>Jogo do Carro</h1>
  <canvas id="gameCanvas" width="640" height="480"></canvas>
  <div id="controls">
    <button id="leftBtn">Esquerda</button>
    <button id="rightBtn">Direita</button>
    <button id="restartBtn">Reiniciar</button>
  </div>
  <div id="info">Use pestanejos ou as setas ←/→ para controlar o carro.</div>
  <div id="blinkStatus">A iniciar deteção...</div>
  <video id="video" autoplay playsinline width="640" height="480" style="display:none"></video>
  <script src="game.js"></script>
  <script src="blink.js"></script>
</body>
</html>
