<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Teste Blink — FaceMesh</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body{font-family:Arial;text-align:center;background:#111;color:#eee;padding:16px}
    video{display:none}
    #status{margin-top:12px}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>
<body>
  <h2>Teste de pestanejo</h2>
  <div style="margin-bottom:12px">
    <button id="simulateBtn">Simular pestanejo</button>
    <span style="color:#ccc; margin-left:10px; font-size:0.9em">Sem câmara? Clique para simular</span>
  </div>
  <video id="video" autoplay playsinline width="640" height="480"></video>
  <div id="status">Aguardando câmera...</div>
  <script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const simulateBtn = document.getElementById('simulateBtn');

    function dist(a,b){ const dx=a.x-b.x, dy=a.y-b.y; return Math.hypot(dx,dy); }

    // índices MediaPipe para olhos (exemplo)
    const LEFT = [33,160,158,133,153,144];
    const RIGHT = [263,387,385,362,380,373];

    function computeEAR(landmarks, idx){
      const p1=landmarks[idx[0]], p2=landmarks[idx[1]], p3=landmarks[idx[2]],
            p4=landmarks[idx[3]], p5=landmarks[idx[4]], p6=landmarks[idx[5]];
      const vertical = (dist(p2,p6) + dist(p3,p5));
      const horizontal = dist(p1,p4) * 2.0;
      return vertical / horizontal;
    }

    let leftClosed=false, rightClosed=false;
    const THRESH=0.20;
    const MIN_INTERVAL=300;
    let lastTrigger=0;
    let simulateSide='left';

    function onResults(results){
      if(!results.multiFaceLandmarks || results.multiFaceLandmarks.length===0){
        status.textContent = 'Rosto não detetado';
        return;
      }
      const lm = results.multiFaceLandmarks[0];
      const leftEAR = computeEAR(lm, LEFT);
      const rightEAR = computeEAR(lm, RIGHT);
      const now = Date.now();

      if (leftEAR < THRESH && !leftClosed){
        leftClosed = true;
        if (now - lastTrigger > MIN_INTERVAL){
          lastTrigger = now;
          console.log('Pestanejo: olho esquerdo');
          status.textContent = `Pestanejo (esq) — EAR ${leftEAR.toFixed(2)}`;
        }
      } else if (leftEAR >= THRESH) leftClosed = false;

      if (rightEAR < THRESH && !rightClosed){
        rightClosed = true;
        if (now - lastTrigger > MIN_INTERVAL){
          lastTrigger = now;
          console.log('Pestanejo: olho direito');
          status.textContent = `Pestanejo (dir) — EAR ${rightEAR.toFixed(2)}`;
        }
      } else if (rightEAR >= THRESH) rightClosed = false;

      status.textContent = `EAR L:${leftEAR.toFixed(2)} R:${rightEAR.toFixed(2)}`;
    }

    function simulateBlink(side){
      const now = Date.now();
      if (now - lastTrigger < MIN_INTERVAL){
        status.textContent = 'Aguarde antes de simular outro pestanejo';
        return;
      }
      lastTrigger = now;
      console.log(`Simulação: olho ${side}`);
      status.textContent = `Simulação: olho ${side} fechado`;
    }

    simulateBtn.addEventListener('click', () => {
      simulateBlink(simulateSide);
      simulateSide = simulateSide === 'left' ? 'right' : 'left';
    });

    const faceMesh = new FaceMesh({locateFile: (f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
    faceMesh.setOptions({maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:0.6, minTrackingConfidence:0.6});
    faceMesh.onResults(onResults);

    async function start(){
      try{
        const stream = await navigator.mediaDevices.getUserMedia({video:{width:640,height:480}});
        video.srcObject = stream;
        await video.play();
        status.textContent = 'Câmera ligada — a processar...';
        const camera = new Camera(video, {
          onFrame: async ()=> await faceMesh.send({image: video}),
          width: 640, height: 480
        });
        camera.start();
      } catch(e){
        status.textContent = 'Sem câmera disponível. Use o botão de simulação abaixo.';
        console.error(e);
      }
    }
    start();
  </script>
</body>
</html>
